{% extends 'base.html' %}

{% block content %}

<head><link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script></head>
<div style="margin-bottom:15px;">
    <button
        type="button"
        class="nav-btn"
        onclick="history.back()">
        ← Back
    </button>
</div>
<h2>Add Expense</h2>

<form method="POST">

    {% csrf_token %}

    <input type="date"
           name="date"
           required>

    <input type="text"
           name="title"
           placeholder="Title"
           required>

    <label>Expense Type</label>

    <select name="category"
            id="category"
            onchange="toggleCustomCategory()">

        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
        <option value="Groceries">Groceries</option>
        <option value="Clothing">Clothing</option>
        <option value="Electricity">Electricity</option>
        <option value="Rent">Rent</option>
        <option value="Recharge">Recharge</option>
        <option value="Custom">Custom</option>

    </select>

    <input type="text"
           id="customCategory"
           name="custom_category"
           placeholder="Enter custom expense type"
           style="display:none;">

   <label>Location</label>

<input
    type="text"
    id="location"
    name="location"
    placeholder="Enter location or select from map"
>

<div id="map"
     style="height:400px; margin-top:10px; border-radius:10px;">
</div>


    <button type="button"
            onclick="getLocation()">
        📍 Current Location
    </button>

    <input type="number"
           step="0.01"
           name="amount"
           placeholder="Amount"
           required>

    <textarea name="description"
              placeholder="Description"></textarea>

    <button type="submit">
        Save Expense
    </button>

</form>

<script>


function getLocation() {

    navigator.geolocation.getCurrentPosition(

        async function(position) {

            let lat = position.coords.latitude;
            let lon = position.coords.longitude;

            try {

                let response = await fetch(
    `https://nominatim.openstreetmap.org/reverse?format=json&accept-language=en&lat=${lat}&lon=${lon}`
);

                let data = await response.json();

                const place =
    data.address.city ||
    data.address.town ||
    data.address.village ||
    data.address.suburb ||
    data.address.county ||
    data.address.state ||
    "Selected Location";

                // Fill textbox
                document.getElementById("location").value = place;

                // Move map to current location
                map.setView([lat, lon], 16);

                // Remove old marker
                if(marker){
                    map.removeLayer(marker);
                }

                // Add new marker
                marker = L.marker([lat, lon])
                    .addTo(map)
                    .bindPopup("📍 Current Location<br>" + place)
                    .openPopup();

            } catch(error) {

                document.getElementById("location").value =
                    lat + "," + lon;
            }
        },

        function(error) {
            alert("Unable to fetch your location.");
        }

    );
}
function toggleCustomCategory() {

    let category =
        document.getElementById("category").value;

    let customBox =
        document.getElementById("customCategory");

    if(category === "Custom") {

        customBox.style.display = "block";
        customBox.required = true;

    } else {

        customBox.style.display = "none";
        customBox.required = false;
        customBox.value = "";
    }
}

var map = L.map('map').setView([13.3409, 74.7421], 12); // Udupi area

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap contributors'
    }
).addTo(map);

var marker;

map.on('click', async function(e) {

    let lat = e.latlng.lat;
    let lng = e.latlng.lng;

    if(marker){
        map.removeLayer(marker);
    }

    marker = L.marker([lat, lng]).addTo(map);

    try {

        const response = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&accept-language=en&lat=${lat}&lon=${lng}`
        );

        const data = await response.json();

        let place =
            data.address.city ||
            data.address.town ||
            data.address.village ||
            data.address.hamlet ||
            data.address.suburb ||
            data.address.county ||
            data.address.state_district ||
            data.address.state ||
            data.display_name;

        document.getElementById("location").value = place;

        marker.bindPopup("📍 " + place).openPopup();

    }
    catch(error){

        document.getElementById("location").value =
            lat.toFixed(6) + ", " + lng.toFixed(6);
    }
});
</script>

{% endblock %}
