{% extends 'base.html' %}

{% block content %}
<div style="margin-bottom:15px;">
    <button
        type="button"
        class="nav-btn"
        onclick="history.back()">
        ← Back
    </button>
</div>

<h2>✏️ Edit Earning</h2>

<form method="POST">

    {% csrf_token %}

    <input type="text"
           name="title"
           value="{{ earning.title }}"
           required>

    <input type="text"
           name="client_name"
           value="{{ earning.client_name }}"
           required>

    <input type="text"
           name="location"
           value="{{ earning.location }}"
           required>

    <input type="number"
           step="0.01"
           name="amount"
           value="{{ earning.amount }}"
           required>

    <textarea name="description"
              rows="4">{{ earning.description }}</textarea>

    <button type="submit">
        Save Changes
    </button>

</form>

<br>

<a href="{% url 'dashboard' %}">
    <button>Cancel</button>
</a>

{% endblock %}
