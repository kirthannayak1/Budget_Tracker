{% extends 'base.html' %}

{% block content %}
<div style="margin-bottom:15px;">
    <button
        type="button"
        class="nav-btn"
        onclick="history.back()">
        ← Back
    </button>
</div>

<h2>Edit Salary</h2>

<form method="POST">

    {% csrf_token %}

    <input
        type="number"
        step="0.01"
        name="salary"
        value="{{ request.user.monthly_salary }}"
        required>

    <button type="submit">
        Save Salary
    </button>

</form>

{% endblock %}
