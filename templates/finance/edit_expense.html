{% extends 'base.html' %}

{% block content %}
<div style="margin-bottom:15px;">
    <button
        type="button"
        class="nav-btn"
        onclick="history.back()">
        ← Back
    </button>
</div>

<h2>✏️ Edit Expense</h2>

<form method="POST">

    {% csrf_token %}

    <input type="text"
           name="title"
           value="{{ expense.title }}"
           required>

    <label>Expense Type</label>

    <select name="category">

        {% for cat in categories %}

            <option value="{{ cat.name }}"
            {% if expense.category.name == cat.name %}
                selected
            {% endif %}
            >
                {{ cat.name }}
            </option>

        {% endfor %}

        <option value="Custom">Custom</option>

    </select>

    <input type="text"
           id="customCategory"
           name="custom_category"
           placeholder="New custom category">

    <input type="text"
           name="location"
           value="{{ expense.location }}"
           required>

    <input type="number"
           step="0.01"
           name="amount"
           value="{{ expense.amount }}"
           required>

    <textarea name="description"
              rows="4">{{ expense.description }}</textarea>

    <button type="submit">
        Save Changes
    </button>

</form>

<br>

<a href="{% url 'dashboard' %}">
    <button>Cancel</button>
</a>

{% endblock %}
